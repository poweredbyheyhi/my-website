<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBHH | RADIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        .player-card { background: #0a0a0a; border: 1px solid #1f1f1f; }
        .glass-btn { background: #121212; border: 1px solid #222; }
        .tab-btn { color: #525252; transition: all 0.3s; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid #ef4444; }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-xl mx-auto px-6 py-12">
        <div class="flex gap-8 mb-12 border-b border-white/5 pb-6" id="tabs">
            <button class="tab-btn active font-bold uppercase tracking-widest text-sm" onclick="switchTab(this)">Library</button>
            <button class="tab-btn font-bold uppercase tracking-widest text-sm" onclick="switchTab(this)">Radio</button>
            <button class="tab-btn font-bold uppercase tracking-widest text-sm" onclick="switchTab(this)">Frameworks</button>
        </div>

        <div class="player-card p-8 rounded-3xl mb-8 flex items-center gap-6">
            <div id="play-btn" class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center cursor-pointer hover:scale-105 transition-transform">
                <span id="play-icon" class="text-2xl">▶</span>
            </div>
            <div>
                <p class="text-[10px] uppercase tracking-widest text-red-500 font-bold">Now Playing</p>
                <h2 class="text-xl font-medium">Divine Awareness</h2>
                <div class="w-64 h-1 bg-white/10 mt-4 rounded-full overflow-hidden">
                    <div id="progress" class="w-0 h-full bg-red-500 transition-all duration-1000"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-btn p-6 rounded-2xl hover:border-red-500 transition-all">🪙 <span class="ml-2 font-bold text-sm">Coin</span></div>
            <div class="glass-btn p-6 rounded-2xl hover:border-red-500 transition-all">🪞 <span class="ml-2 font-bold text-sm">Mirror</span></div>
        </div>
    </div>

    <script>
        function switchTab(el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        let playing = false;
        document.getElementById('play-btn').onclick = function() {
            playing = !playing;
            document.getElementById('play-icon').innerText = playing ? "⏸" : "▶";
            document.getElementById('progress').style.width = playing ? "100%" : "0%";
        };
    </script>
</body>
</html>
