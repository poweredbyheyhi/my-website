<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBHH | RADIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #ef4444; border-bottom: 1px solid #ef4444; }
        .active-btn { color: #ef4444; opacity: 1 !important; }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-2xl mx-auto px-6 pt-12 pb-6">
        <h1 class="text-4xl font-light text-[#ff2a2a] tracking-[0.1em]">PBHH RADIO</h1>
    </div>

    <div class="sticky top-0 z-50 bg-black p-4">
        <div class="aspect-video w-full max-w-2xl mx-auto">
            <iframe id="main-player" class="w-full h-full" src="https://www.youtube.com/embed/pzr2eZtcWK8?enablejsapi=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        
        <div class="max-w-xs mx-auto flex justify-between items-center mt-8 text-white">
            <button id="shuffleBtn" onclick="toggleShuffle()" class="opacity-50 transition">🔀</button>
            <button onclick="changeTrack(-1)" class="hover:text-red-500 transition text-2xl">⏮</button>
            <button id="playBtn" onclick="togglePlay()" class="w-16 h-16 rounded-full bg-white text-black flex items-center justify-center font-bold text-2xl hover:bg-red-500 transition-all">❚❚</button>
            <button onclick="changeTrack(1)" class="hover:text-red-500 transition text-2xl">⏭</button>
            <button id="repeatBtn" onclick="toggleRepeat()" class="opacity-50 transition">🔁</button>
        </div>
    </div>

    <script>
        const tracks = [
            { id: "pzr2eZtcWK8", title: "Boo boo boo bop" },
            { id: "_r9U0mrvLHQ", title: "Preach Pastor" },
            { id: "j26Pp_EsFuE", title: "Polaris" }
        ];
        let currentIndex = 0;
        let isPlaying = true;
        let isShuffle = false;
        let isRepeat = false;
        const playerFrame = document.getElementById('main-player');

        function sendCommand(func, args = []) {
            playerFrame.contentWindow.postMessage(JSON.stringify({'event': 'command', 'func': func, 'args': args}), '*');
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            sendCommand(isPlaying ? 'playVideo' : 'pauseVideo');
            document.getElementById('playBtn').innerText = isPlaying ? '❚❚' : '▶';
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('shuffleBtn').classList.toggle('active-btn', isShuffle);
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('repeatBtn').classList.toggle('active-btn', isRepeat);
        }

        function changeTrack(dir) {
            if (isShuffle) {
                currentIndex = Math.floor(Math.random() * tracks.length);
            } else {
                currentIndex = (currentIndex + dir + tracks.length) % tracks.length;
            }
            sendCommand('loadVideoById', [tracks[currentIndex].id]);
            document.getElementById('playBtn').innerText = '❚❚';
            isPlaying = true;
        }

        // Listen for video end to handle repeat/auto-next
        window.addEventListener("message", (event) => {
            const data = JSON.parse(event.data);
            if (data.info && data.info.playerState === 0) {
                if (isRepeat) {
                    sendCommand('seekTo', [0]);
                    sendCommand('playVideo', []);
                } else {
                    changeTrack(1);
                }
            }
        });
    </script>
</body>
</html>
