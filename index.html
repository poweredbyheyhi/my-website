<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        .player-card { background: #0a0a0a; border: 1px solid #1f1f1f; }
        .glass-btn { background: #121212; border: 1px solid #222; }

<body class="font-sans antialiased">

            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-btn p-6 rounded-2xl cursor-pointer">
                <div class="text-xl mb-2">🪙</div>
