<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBHH | RADIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        .tab-btn.active { color: #ef4444; }
        .hidden-content { display: none; }
        .visible-content { display: block; }
    </style>
</head>
<body class="font-sans antialiased pb-24">
    
    <div class="sticky top-0 z-50 bg-black/90 backdrop-blur-md p-4">
        <div class="aspect-video w-full max-w-2xl mx-auto">
            <iframe id="main-player" class="w-full h-full" src="https://www.youtube.com/embed/pzr2eZtcWK8" allowfullscreen></iframe>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-6 mt-8">
        <div class="flex gap-8 mb-8 font-bold uppercase text-xs tracking-widest text-zinc-500">
            <button onclick="show('releases')" class="tab-btn active">Releases</button>
            <button onclick="show('about')" class="tab-btn">About</button>
            <a href="https://pbhhradio.com" class="text-red-500">Launch App</a>
        </div>

        <div id="releases" class="visible-content space-y-4">
            <div id="library"></div>
        </div>

        <div id="about" class="hidden-content text-zinc-400">
            <p>PBHH Radio is a sonic exploration of the Nine Frameworks. Everything you knead is already grown.</p>
        </div>
    </div>

    <script>
        const tracks = [
            { "id": "pzr2eZtcWK8", "title": "Boo boo boo bop" },
            { "id": "_r9U0mrvLHQ", "title": "Preach Pastor" },
            { "id": "j26Pp_EsFuE", "title": "Polaris" }
            // Add your full list here following this format
        ];

        function show(id) {
            document.querySelectorAll('.visible-content, .hidden-content').forEach(el => {
                el.classList.replace('visible-content', 'hidden-content') || el.classList.add('hidden-content');
            });
            document.getElementById(id).classList.replace('hidden-content', 'visible-content');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        const library = document.getElementById('library');
        tracks.forEach(track => {
            const div = document.createElement('div');
            div.className = "flex justify-between items-center py-4 border-b border-white/5";
            div.innerHTML = `
                <span class="text-sm">${track.title}</span>
                <div class="flex gap-4">
                    <button onclick="document.getElementById('main-player').src='https://www.youtube.com/embed/${track.id}'" class="text-xs text-red-500">PLAY</button>
                    <a href="https://youtube.com/watch?v=${track.id}" target="_blank" class="text-xs text-zinc-600">YOUTUBE</a>
                </div>
            `;
            library.appendChild(div);
        });
    </script>
</body>
</html>
