<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBHH | RADIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        .player-box { background: #0a0a0a; border: 1px solid #222; }
        .track-item:hover { background: #1a1a1a; cursor: pointer; }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="max-w-2xl mx-auto px-6 py-12">
        <h1 class="text-2xl font-bold mb-8 tracking-widest text-red-500">PBHH RADIO</h1>
        
        <div class="player-box p-1 rounded-2xl mb-8 aspect-video">
            <iframe id="main-player" class="w-full h-full rounded-xl" src="https://www.youtube.com/embed/pzr2eZtcWK8" allowfullscreen></iframe>
        </div>

        <div id="library" class="space-y-2">
            </div>
    </div>

    <script>
        const tracks = [
            { "id": "pzr2eZtcWK8", "title": "Boo boo boo bop" },
            { "id": "_r9U0mrvLHQ", "title": "Preach Pastor" },
            { "id": "j26Pp_EsFuE", "title": "Polaris" },
            { "id": "CyGIjgb7DJY", "title": "Kendra’s Lala-Bye! 9" },
            { "id": "Gkhu1P9lYG4", "title": "Chinatown" },
            { "id": "AzptWfKgpwc", "title": "Monica’s Kids (Olive Branch)" },
            { "id": "Q90ftOQeVOM", "title": "Weakened Cruise" },
            { "id": "HTjxgmwCOqQ", "title": "Catoosh!" }
            // Add more entries here as needed from your list
        ];

        const library = document.getElementById('library');
        tracks.forEach(track => {
            const btn = document.createElement('button');
            btn.className = "track-item w-full p-4 rounded-xl text-left flex justify-between";
            btn.onclick = () => document.getElementById('main-player').src = "https://www.youtube.com/embed/" + track.id;
            btn.innerHTML = `<span>${track.title}</span><span class="text-zinc-600 text-xs">PLAY</span>`;
            library.appendChild(btn);
        });
    </script>
</body>
</html>
