<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBHH | RADIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #ef4444; }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-2xl mx-auto px-6 pt-12 pb-6">
        <h1 class="text-4xl font-light text-[#ff2a2a] tracking-[0.1em]">PBHH RADIO</h1>
    </div>

    <div class="sticky top-0 z-50 bg-black p-4">
        <div class="aspect-video w-full max-w-2xl mx-auto">
            <div id="player"></div>
        </div>
        
        <div class="max-w-xs mx-auto flex justify-between items-center mt-8">
            <button class="text-zinc-600">🔀</button>
            <button onclick="prevTrack()" class="text-white text-xl">⏮</button>
            <button id="playBtn" onclick="togglePlay()" class="w-16 h-16 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold text-2xl">❚❚</button>
            <button onclick="nextTrack()" class="text-white text-xl">⏭</button>
            <button class="text-zinc-600">🔁</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-6 mt-8">
        <div class="flex gap-8 mb-8 uppercase text-[10px] tracking-widest text-zinc-500">
            <button onclick="switchTab(event, 'releases')" class="nav-active">Releases</button>
            <button onclick="switchTab(event, 'about')">About</button>
            <a href="https://pbhhradio.com" class="text-red-500">Launch App</a>
        </div>

        <div id="releases" class="tab-content active">
            <div id="library"></div>
        </div>
        <div id="about" class="tab-content text-zinc-400">PBHH Radio is a sonic exploration.</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let currentIndex = 0;
        const tracks = [
            { id: "pzr2eZtcWK8", title: "Boo boo boo bop" },
            { id: "_r9U0mrvLHQ", title: "Preach Pastor" },
            { id: "j26Pp_EsFuE", title: "Polaris" }
        ];

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%',
                videoId: tracks[0].id,
                playerVars: { 'autoplay': 0, 'controls': 0, 'rel': 0 }
            });
        }

        function togglePlay() {
            const state = player.getPlayerState();
            if (state === 1) { player.pauseVideo(); document.getElementById('playBtn').innerText = '▶'; }
            else { player.playVideo(); document.getElementById('playBtn').innerText = '❚❚'; }
        }

        function nextTrack() {
            currentIndex = (currentIndex + 1) % tracks.length;
            player.loadVideoById(tracks[currentIndex].id);
        }

        function prevTrack() {
            currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
            player.loadVideoById(tracks[currentIndex].id);
        }

        function switchTab(evt, id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('button').forEach(el => el.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active');
            evt.currentTarget.classList.add('nav-active');
        }

        const library = document.getElementById('library');
        tracks.forEach((track, index) => {
            const div = document.createElement('div');
            div.className = "flex justify-between items-center py-6 border-b border-zinc-900 cursor-pointer";
            div.innerHTML = `<span class="text-sm font-light">${track.title}</span><span class="text-[10px] uppercase text-zinc-600">Listen</span>`;
            div.onclick = () => { currentIndex = index; player.loadVideoById(track.id); };
            library.appendChild(div);
        });
    </script>
</body>
</html>
