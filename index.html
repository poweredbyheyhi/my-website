<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>PBHH | RADIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        .active-state { color: #ef4444; opacity: 1 !important; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <div id="player-container" class="aspect-video w-full"></div>
        
        <div class="flex justify-between items-center mt-8 px-4 text-2xl">
            <button id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
            <button onclick="changeTrack(-1)">⏮</button>
            <button id="playBtn" onclick="togglePlay()" class="w-16 h-16 rounded-full bg-white text-black font-bold">❚❚</button>
            <button onclick="changeTrack(1)">⏭</button>
            <button id="repeatBtn" onclick="toggleRepeat()">🔁</button>
        </div>
        <p id="trackTitle" class="text-center mt-6 text-sm opacity-60"></p>
    </div>

    <script>
        const tracks = [
            { id: "pzr2eZtcWK8", title: "Boo boo boo bop" },
            { id: "_r9U0mrvLHQ", title: "Preach Pastor" },
            { id: "j26Pp_EsFuE", title: "Polaris" }
        ];
        let currentIndex = 0;
        let isShuffle = false;
        let isRepeat = false;
        let player;

        // Load YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-container', {
                height: '100%',
                width: '100%',
                videoId: tracks[currentIndex].id,
                events: {
                    'onStateChange': (e) => {
                        if (e.data === 0) { // Ended
                            if (isRepeat) { player.playVideo(); } 
                            else { changeTrack(1); }
                        }
                    }
                }
            });
            document.getElementById('trackTitle').innerText = tracks[currentIndex].title;
        }

        function togglePlay() {
            const state = player.getPlayerState();
            if (state === 1) { player.pauseVideo(); document.getElementById('playBtn').innerText = '▶'; }
            else { player.playVideo(); document.getElementById('playBtn').innerText = '❚❚'; }
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('shuffleBtn').classList.toggle('active-state', isShuffle);
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('repeatBtn').classList.toggle('active-state', isRepeat);
        }

        function changeTrack(dir) {
            currentIndex = isShuffle ? Math.floor(Math.random() * tracks.length) 
                                     : (currentIndex + dir + tracks.length) % tracks.length;
            player.loadVideoById(tracks[currentIndex].id);
            document.getElementById('trackTitle').innerText = tracks[currentIndex].title;
            document.getElementById('playBtn').innerText = '❚❚';
        }
    </script>
</body>
</html>
