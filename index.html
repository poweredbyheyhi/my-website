<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBHH | RADIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        .player-box { background: #0a0a0a; border: 1px solid #222; }
        .tab-btn { color: #525252; }
        .tab-btn.active { color: #ef4444; border-bottom: 2px solid #ef4444; }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-xl mx-auto px-6 py-12">
        <div class="flex gap-8 mb-8 border-b border-white/5 pb-4" id="tabs">
            <button class="tab-btn active font-bold uppercase text-xs tracking-widest" onclick="switchTab(this)">Radio</button>
            <button class="tab-btn font-bold uppercase text-xs tracking-widest" onclick="switchTab(this)">Library</button>
        </div>

        <div class="player-box p-1 rounded-2xl mb-8 overflow-hidden aspect-video">
            <iframe id="video-player" class="w-full h-full rounded-xl" src="https://www.youtube.com/embed/YOUR_DEFAULT_VIDEO_ID" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="loadVideo('VIDEO_ID_1')" class="bg-[#121212] p-4 rounded-xl text-left border border-[#222] hover:border-red-500 transition-all">
                <div class="text-sm font-bold">Latest Broadcast</div>
                <div class="text-[10px] text-zinc-500">Divine Awareness</div>
            </button>
            <button onclick="loadVideo('VIDEO_ID_2')" class="bg-[#121212] p-4 rounded-xl text-left border border-[#222] hover:border-red-500 transition-all">
                <div class="text-sm font-bold">Framework 01</div>
                <div class="text-[10px] text-zinc-500">The Coin</div>
            </button>
        </div>
    </div>

    <script>
        function switchTab(el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function loadVideo(id) {
            document.getElementById('video-player').src = "https://www.youtube.com/embed/" + id;
        }
    </script>
</body>
</html>
