<div class="max-w-md mx-auto flex justify-center items-center gap-6 my-8">
    <button class="opacity-50 hover:opacity-100 transition">🔀</button>
    <button onclick="prevTrack()" class="hover:text-red-500 transition">⏮</button>
    
    <button id="main-play-pause" onclick="togglePlay()" 
            class="w-14 h-14 rounded-full bg-white text-black flex items-center justify-center hover:scale-105 transition-all">
        <span id="play-icon">▶</span>
    </button>
    
    <button onclick="nextTrack()" class="hover:text-red-500 transition">⏭</button>
    <button class="opacity-50 hover:opacity-100 transition">🔁</button>
</div>

<script>
    let isPlaying = false;
    function togglePlay() {
        const player = document.getElementById('main-player');
        const icon = document.getElementById('play-icon');
        // This is a visual toggle; YouTube iframe API is required for true control
        isPlaying = !isPlaying;
        icon.innerText = isPlaying ? "⏸" : "▶";
    }
</script>
