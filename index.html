<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBHH | RADIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #ef4444; border-bottom: 1px solid #ef4444; }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-2xl mx-auto px-6 pt-12 pb-6">
        <h1 class="text-4xl font-light text-[#ff2a2a] tracking-[0.1em]">PBHH RADIO</h1>
    </div>

    <div class="sticky top-0 z-50 bg-black p-4">
        <div class="aspect-video w-full max-w-2xl mx-auto">
            <iframe id="main-player" class="w-full h-full" src="https://www.youtube.com/embed/pzr2eZtcWK8" frameborder="0" allowfullscreen></iframe>
        </div>
        
        <div class="max-w-xs mx-auto flex justify-between items-center mt-8 text-white">
            <button class="opacity-50">🔀</button>
            <button onclick="changeTrack(-1)" class="hover:text-red-500 transition text-2xl">⏮</button>
            <button class="w-16 h-16 rounded-full bg-white text-black flex items-center justify-center font-bold text-2xl hover:bg-red-500 transition-all">❚❚</button>
            <button onclick="changeTrack(1)" class="hover:text-red-500 transition text-2xl">⏭</button>
            <button class="opacity-50">🔁</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-6 mt-8">
        <div class="flex gap-8 mb-8 uppercase text-[10px] tracking-widest text-zinc-500">
            <button onclick="switchTab(event, 'releases')" class="nav-active">Releases</button>
            <button onclick="switchTab(event, 'about')">About</button>
            <a href="https://pbhhradio.com" class="text-red-500">Launch App</a>
        </div>

        <div id="releases" class="tab-content active">
            <div id="library"></div>
        </div>
        <div id="about" class="tab-content text-zinc-400">PBHH Radio is a sonic exploration.</div>
    </div>

    <script>
        const tracks = [
            { id: "pzr2eZtcWK8", title: "Boo boo boo bop" },
            { id: "_r9U0mrvLHQ", title: "Preach Pastor" },
            { id: "j26Pp_EsFuE", title: "Polaris" }
        ];
        let currentIndex = 0;

        function changeTrack(dir) {
            currentIndex = (currentIndex + dir + tracks.length) % tracks.length;
            document.getElementById('main-player').src = "https://www.youtube.com/embed/" + tracks[currentIndex].id + "?autoplay=1";
        }

        function switchTab(evt, id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('button').forEach(el => el.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active');
            evt.currentTarget.classList.add('nav-active');
        }

        const library = document.getElementById('library');
        tracks.forEach((track, index) => {
            const div = document.createElement('div');
            div.className = "flex justify-between items-center py-6 border-b border-zinc-900 cursor-pointer hover:border-zinc-700";
            div.innerHTML = `<span class="text-sm font-light">${track.title}</span><span class="text-[10px] uppercase text-zinc-600">Listen</span>`;
            div.onclick = () => { currentIndex = index; document.getElementById('main-player').src = "https://www.youtube.com/embed/" + track.id + "?autoplay=1"; };
            library.appendChild(div);
        });
    </script>
</body>
</html>
